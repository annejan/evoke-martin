# Auto-merge Dependabot PRs once CI is green — but ONLY patch + minor bumps; majors (which tend to
# need code changes) stay manual. The merge is gated by branch protection's required status checks
# (rustfmt, REUSE, the build matrix, CodeQL), so `--auto` only completes after they pass. Keeps the
# dependency pins fresh hands-off without merging anything red.
name: dependabot-automerge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # only act on Dependabot's own PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Enable auto-merge for patch/minor only — GitHub then merges once the required checks pass.
      - name: Enable auto-merge (patch/minor)
        if: contains(fromJSON('["version-update:semver-patch", "version-update:semver-minor"]'), steps.meta.outputs.update-type)
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
