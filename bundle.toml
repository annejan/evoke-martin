# bundle.toml — what `cargo build --release --features bundle` (or ./pipeline/release.sh) bakes into
# ONE self-contained binary. build.rs reads this, auto-collects every asset the show references
# (splat:/image:/mesh:/glb:/model: filenames + an .obj's .mtl sibling), lz4-compresses them into the
# executable, and at startup src/bundle.rs self-extracts to a temp dir and plays the show with no
# external files and no env vars (the loader screen runs while it decompresses). Env still overrides.
#
# `show`/`seq`/`compose` is a path to a show file or an inline spec. Fonts + the default score are
# compiled into martin; only the meshes/PNG ship. The default demo references ONLY the published,
# licence-cleared mesh + logo assets (no .ply), so this builds from a clean checkout — and in CI.

show = "assets/demo.show"         # the default self-contained demo (unified .show: seq + camera track)
score = "assets/score.txt"        # the (placeholder) track + the @@anchor timing
logo = "defeest-logo.png"         # shown on the loader screen
# morph_count is a setting inside demo.show; a bundle.toml `morph_count = …` would still override it.
