# bundle.toml — what `cargo build --release --features bundle` bakes into a single self-contained
# binary. The pipeline reads this, auto-collects every .ply/PNG the show references, lz4-compresses
# them into the executable, and at startup the binary self-extracts to a temp dir and plays the
# show with no external asset files and no env vars (env still overrides for debugging).
#
# `seq` / `compose` is either a path to a show file or an inline spec (same rule as MARTIN_SEQ).
# Fonts + the score's builtin are already compiled into martin, so only .ply (+ the logo PNG) ship.

seq = "splat:doggo.ply ~ball; splat:martin.ply+martin-peace.ply ~morph; splat:doggo.ply ~morph"
asset_dir = "assets"
score = "assets/score.txt"
logo = "defeest-logo.png"      # shown on the loader screen while the splats decompress + load
morph_count = "250000"
