# bundle.toml — what `./pipeline/release.sh` (or `cargo build --release --features bundle`) bakes
# into a single self-contained binary. The pipeline reads this, auto-collects every .ply/PNG the
# show references, lz4-compresses them into the executable, and at startup the binary self-extracts
# to a temp dir and plays the show with no external files and no env vars (the loader screen runs
# while the splats decompress). Env vars still override for debugging.
#
# `seq`/`compose` is a path to a show file or an inline spec. Fonts + the default score are already
# compiled into martin, so only splats (+ the logo PNG) ship. The referenced .ply must exist locally
# at build time (they're git-ignored); generate the demo shapes first: python3 pipeline/gen-demo-splats.py

seq = "assets/release.seq"        # the light, self-contained ~song-length showcase
score = "assets/score.txt"        # the (placeholder) track + the @@anchor timing
logo = "defeest-logo.png"         # shown on the loader screen
morph_count = "180000"            # gaussian budget per part (smaller = smaller frames + faster)
